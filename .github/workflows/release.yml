name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            suffix: linux-amd64-glibc
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-amd64-musl
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            suffix: linux-arm64-glibc
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            suffix: linux-arm64-musl

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          if [[ "${{ matrix.target }}" == *-musl ]]; then
            sudo apt-get update && sudo apt-get install -y musl-tools
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-12
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename and checksum
        run: |
          BIN="nsproxy-${{ matrix.suffix }}"
          mv "target/${{ matrix.target }}/release/nsproxy" "$BIN"
          sha256sum "$BIN" > "$BIN.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nsproxy-${{ matrix.suffix }}
            nsproxy-${{ matrix.suffix }}.sha256
